.github/workflows/build.yml
name: Build TawfiqWRT Cubie A5E

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Template
        uses: actions/checkout@v4

      - name: Clone Kwrt and Merge Drivers
        run: |
          git clone https://github.com/kiddin9/Kwrt.git openwrt
          cd openwrt
          git clone -b allwinner-aiot-linux-5.15 https://github.com/radxa/kernel.git
          git clone https://github.com/Misaka-Nnnnq/Radxa_A5E_Firmware.git

      - name: Compile Custom Firmware
        run: |
          echo "Building your ultra-stable Cubie A5E Firmware..."
