name: Build OpenWrt for Cubie A5e

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (ignore cache)'
        required: false
        default: 'false'
        type: boolean

env:
  REPO_URL: https://github.com/hmmmonteiro/openwrt-cubie-a5e
  REPO_BRANCH: 23.05-cubie-a5e
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  UPLOAD_RELEASE: true
  TZ: Asia/Dhaka

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget curl
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone OpenWrt source
        working-directory: /workdir
        run: |
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Add custom feeds (iStore, Argon theme)
        run: |
          cd /workdir/openwrt
          # iStore App Store
          echo 'src-git istore https://github.com/linkease/istore;main' >> feeds.conf.default
          echo 'src-git istore_ui https://github.com/linkease/istore-ui;main' >> feeds.conf.default
          # Argon theme
          echo 'src-git argon https://github.com/jerrykuku/luci-theme-argon;master' >> feeds.conf.default

      - name: Update & install feeds
        run: |
          cd /workdir/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # Install iStore packages specifically
          ./scripts/feeds install -d y -p istore luci-app-store

      - name: Copy .config
        run: |
          cp $GITHUB_WORKSPACE/.config /workdir/openwrt/.config

      - name: Copy custom files
        run: |
          if [ -d "$GITHUB_WORKSPACE/files" ]; then
            cp -r $GITHUB_WORKSPACE/files/* /workdir/openwrt/files/ 2>/dev/null || true
          fi

      - name: Apply patches
        run: |
          if ls $GITHUB_WORKSPACE/patches/*.patch 2>/dev/null; then
            cd /workdir/openwrt
            for patch in $GITHUB_WORKSPACE/patches/*.patch; do
              git apply "$patch" || echo "Skipping patch: $patch"
            done
          fi

      - name: Download packages
        run: |
          cd /workdir/openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        id: compile
        run: |
          cd /workdir/openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: OpenWrt-CubieA5e-${{ env.FILE_DATE }}
          path: /workdir/openwrt/bin/targets/sunxi/cortexa53/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        with:
          tag_name: v${{ env.FILE_DATE }}
          name: OpenWrt for Cubie A5e | ${{ env.FILE_DATE }}
          body: |
            ## OpenWrt Firmware for Radxa Cubie A5E

            **Features:**
            - âœ… LuCI Web UI (Argon Theme)
            - âœ… iStore App Store
            - âœ… Docker (dockerd)
            - âœ… Dual Gigabit Ethernet

            **Flash Instructions:**
            - SD Card: Use **PhoenixCard**
            - eMMC/SPI: Use **PhoenixSuit**

            **Default Login:**
            - IP: `192.168.1.1`
            - Username: `root`
            - Password: `password`
          files: /workdir/openwrt/bin/targets/sunxi/cortexa53/*
