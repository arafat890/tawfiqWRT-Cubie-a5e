name: Build TawfiqWRT Cubie A5E

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 rsync

      - name: Clone Kwrt Base Firmware
        run: |
          git clone https://github.com/kiddin9/Kwrt.git openwrt
          cd openwrt
          git clone -b allwinner-aiot-linux-5.15 https://github.com/radxa/kernel.git
          git clone https://github.com/Misaka-Nnnnq/Radxa_A5E_Firmware.git

      - name: Compile OpenWrt Firmware
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TawfiqWRT-CubieA5E-Image
          path: openwrt/bin/targets/
