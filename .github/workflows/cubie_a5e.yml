name: Build Genuine TawfiqWRT Cubie A5E

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils rsync sudo subversion swig texinfo u-boot-tools upx-ucl unzip vim wget xmlto xz-utils zlib1g-dev libz-dev

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 https://github.com/openwrt/openwrt.git openwrt

      - name: Inject DTS and Update Makefile
        run: |
          cd openwrt
          # অলউইনার dts ফোল্ডারে আপনার Cubie A5E এর আসল ম্যাপ ডাউনলোড করা হচ্ছে
          mkdir -p target/linux/sunxi/dts
          wget -O target/linux/sunxi/dts/sun55i-a527-cubie-a5e.dts https://raw.githubusercontent.com/tschk/soliloquy/main/sun55i-a527-cubie-a5e.dts
          
          # কার্নেল যাতে বুট করার সময় এই নতুন dts ফাইলটি কম্পাইল করে, তার পারমিশন দেওয়া
          if [ -f target/linux/sunxi/image/Makefile ]; then
            echo "define Device/cubie-a5e" >> target/linux/sunxi/image/Makefile
            echo "  DEVICE_VENDOR := Cubieboard" >> target/linux/sunxi/image/Makefile
            echo "  DEVICE_MODEL := Cubie A5E (A527)" >> target/linux/sunxi/image/Makefile
            echo "  SUPPORTED_DEVICES := cubie,cubie-a5e" >> target/linux/sunxi/image/Makefile
            echo "  DEVICE_DTS := sun55i-a527-cubie-a5e" >> target/linux/sunxi/image/Makefile
            echo "endef" >> target/linux/sunxi/image/Makefile
            echo "TARGET_DEVICES += cubie-a5e" >> target/linux/sunxi/image/Makefile
          fi

      - name: Sync Feeds & Enforce Allwinner A527 Config
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # অলউইনার কোর ও আপনার নির্দিষ্ট ডিভাইসের প্রোফাইল সিলেক্ট করা
          echo "CONFIG_TARGET_sunxi=y" > .config
          echo "CONFIG_TARGET_sunxi_cortexa7=n" >> .config
          echo "CONFIG_TARGET_sunxi_DEVICE_cubie-a5e=y" >> .config
          
          make defconfig

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload Genuine Cubie A5E Firmware
        uses: actions/upload-artifact@v4
        with:
          name: TawfiqWRT-Real-CubieA5E
          path: openwrt/bin/targets/sunxi/
